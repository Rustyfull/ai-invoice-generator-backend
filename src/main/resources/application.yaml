spring:
  application:
    name: ai-invoice-generator
  datasource:
    url: jdbc:postgresql:///tele_invoice_db?socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlInstance=${CLOUD_SQL_INSTANCE_CONNECTION_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false


  flyway:
    enabled: true
    locations: classpath:db/migration


  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-4o





server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: "*"


com:
  elite:
    jwt:
      secret: oif0iah9fjßqfh09qhf9qhwf90hqw09fh09qh1whf1hf
      expiration: 8000000
